name: Data Export

on:
  workflow_dispatch:
    inputs:
      view:
        description: "Order view filter"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - pending
          - inprocess
          - completed
          - unapproved
      max_orders:
        description: "Max orders to export (0 = all)"
        required: false
        default: "0"
        type: string
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  export:
    name: Build latest reports
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPORT_USER: ${{ secrets.EXPORT_USER }}
      EXPORT_PASS: ${{ secrets.EXPORT_PASS }}
      EXPORT_BASE_URL: ${{ secrets.EXPORT_BASE_URL }}
      EXPORT_VIEW: ${{ github.event.inputs.view }}
      EXPORT_MAX_ORDERS: ${{ github.event.inputs.max_orders }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl xlwt

      - name: Validate required secrets
        run: |
          if [ -z "${EXPORT_USER}" ] || [ -z "${EXPORT_PASS}" ] || [ -z "${EXPORT_BASE_URL}" ]; then
            echo "Missing one or more required secrets: EXPORT_USER, EXPORT_PASS, EXPORT_BASE_URL."
            exit 1
          fi

      - name: Run export
        run: |
          VIEW="${EXPORT_VIEW:-all}"
          MAX_ORDERS="${EXPORT_MAX_ORDERS:-0}"
          python order_export.py \
            --base-url "${EXPORT_BASE_URL}" \
            --username "${EXPORT_USER}" \
            --password "${EXPORT_PASS}" \
            --view "${VIEW}" \
            --max-orders "${MAX_ORDERS}" \
            --detail-timeout 120 \
            --detail-retries 4 \
            --detail-sleep 0.25 \
            --output orders_latest.csv \
            --items-output order_items_latest.csv \
            --xlsx-output report_latest.xlsx \
            --xls-output report_latest.xls

      - name: Publish latest XLS to Pages folder
        run: |
          mkdir -p docs/latest
          cp report_latest.xls docs/latest/report_latest.xls
          date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/latest/last_updated_utc.txt

      - name: Commit latest XLS (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/latest/report_latest.xls docs/latest/last_updated_utc.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update latest report [skip ci]"
            git push origin main
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-export-${{ github.run_number }}
          retention-days: 30
          if-no-files-found: error
          path: |
            report_latest.xlsx
            report_latest.xls
            orders_latest.csv
            order_items_latest.csv

