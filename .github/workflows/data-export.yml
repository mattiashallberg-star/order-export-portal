name: Data Export

on:
  workflow_dispatch:
    inputs:
      view:
        description: "Order view filter"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - pending
          - inprocess
          - completed
          - unapproved
      max_orders:
        description: "Max orders to export (0 = all)"
        required: false
        default: "0"
        type: string
  schedule:
    # Two attempts for the real monthly send (last Tuesday).
    - cron: "5 8 * * 2"
      timezone: "Europe/Stockholm"
    - cron: "25 8 * * 2"
      timezone: "Europe/Stockholm"
    # Two attempts for precheck send (day before = Monday before last Tuesday).
    - cron: "5 8 * * 1"
      timezone: "Europe/Stockholm"
    - cron: "25 8 * * 1"
      timezone: "Europe/Stockholm"

concurrency:
  group: data-export-monthly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  export:
    name: Build latest reports
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPORT_USER: ${{ secrets.EXPORT_USER }}
      EXPORT_PASS: ${{ secrets.EXPORT_PASS }}
      EXPORT_BASE_URL: ${{ secrets.EXPORT_BASE_URL }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
      PRECHECK_MAIL_TO: mattias.hallberg@gmail.com
      ALERT_TO: mattias.hallberg@gmail.com
      EXPORT_VIEW: ${{ github.event.inputs.view }}
      EXPORT_MAX_ORDERS: ${{ github.event.inputs.max_orders }}
    steps:
      - name: Decide schedule window and recipient (Stockholm time)
        id: schedule_guard
        env:
          TZ: Europe/Stockholm
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "run_kind=manual" >> "$GITHUB_OUTPUT"
            echo "mail_to=${MAIL_TO}" >> "$GITHUB_OUTPUT"
            echo "Manual trigger -> run export using default recipients."
            exit 0
          fi

          YEAR="$(date +%Y)"
          MONTH="$(date +%m)"
          TODAY_DAY=$((10#$(date +%d)))
          TODAY_WDAY=$((10#$(date +%u)))

          LAST_DAY=$((10#$(date -d "${YEAR}-${MONTH}-01 +1 month -1 day" +%d)))
          LAST_DAY_WEEKDAY=$((10#$(date -d "${YEAR}-${MONTH}-${LAST_DAY} 12:00:00" +%u)))
          # Monday=1 ... Sunday=7, Tuesday=2.
          OFFSET=$(((LAST_DAY_WEEKDAY - 2 + 7) % 7))
          LAST_TUESDAY=$((LAST_DAY - OFFSET))
          PRECHECK_DAY=$((LAST_TUESDAY - 1))

          if [ "${TODAY_DAY}" -eq "${LAST_TUESDAY}" ] && [ "${TODAY_WDAY}" -eq 2 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "run_kind=monthly" >> "$GITHUB_OUTPUT"
            echo "mail_to=${MAIL_TO}" >> "$GITHUB_OUTPUT"
            echo "Scheduled window matched: monthly send (last Tuesday)."
          elif [ "${TODAY_DAY}" -eq "${PRECHECK_DAY}" ] && [ "${TODAY_WDAY}" -eq 1 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "run_kind=precheck" >> "$GITHUB_OUTPUT"
            echo "mail_to=${PRECHECK_MAIL_TO}" >> "$GITHUB_OUTPUT"
            echo "Scheduled window matched: precheck send (day before last Tuesday)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "run_kind=none" >> "$GITHUB_OUTPUT"
            echo "mail_to=${MAIL_TO}" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run. Today_day=${TODAY_DAY}, today_wday=${TODAY_WDAY}, last_tuesday=${LAST_TUESDAY}, precheck_day=${PRECHECK_DAY}"
          fi

      - name: Skip outside monthly execution window
        if: ${{ steps.schedule_guard.outputs.run != 'true' }}
        run: |
          echo "No export this run. Windows are Monday+Tuesday around last Tuesday each month at 08:05 and 08:25 Europe/Stockholm."

      - name: Checkout repository
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        env:
          CHECKOUT_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TOKEN="${CHECKOUT_TOKEN}"
          if [ -z "${TOKEN}" ]; then
            TOKEN="${FALLBACK_TOKEN}"
          fi
          if [ -z "${TOKEN}" ]; then
            echo "No checkout token available."
            exit 1
          fi

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          AUTH_B64="$(printf 'x-access-token:%s' "${TOKEN}" | base64 | tr -d '\n')"
          AUTH_HEADER="AUTHORIZATION: basic ${AUTH_B64}"

          git init .
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git remote add origin "${REPO_URL}"
          git config --local http.https://github.com/.extraheader "${AUTH_HEADER}"
          git -c protocol.version=2 fetch --no-tags --prune --no-recurse-submodules --depth=1 origin "+${GITHUB_SHA}:refs/remotes/origin/main"
          git checkout --progress --force -B main refs/remotes/origin/main

      - name: Prevent duplicate scheduled send
        id: monthly_lock
        if: ${{ steps.schedule_guard.outputs.run == 'true' }}
        env:
          TZ: Europe/Stockholm
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger -> monthly lock bypassed."
            exit 0
          fi

          RUN_KIND="${{ steps.schedule_guard.outputs.run_kind }}"
          CURRENT_MONTH="$(date +%Y-%m)"
          MARKER_FILE=""
          if [ "${RUN_KIND}" = "monthly" ]; then
            MARKER_FILE="docs/latest/last_sent_month.txt"
          elif [ "${RUN_KIND}" = "precheck" ]; then
            MARKER_FILE="docs/latest/last_precheck_month.txt"
          fi

          if [ -z "${MARKER_FILE}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "No scheduled marker needed for run_kind=${RUN_KIND}."
            exit 0
          fi

          LAST_SENT=""
          if [ -f "${MARKER_FILE}" ]; then
            LAST_SENT="$(tr -d '[:space:]' < "${MARKER_FILE}")"
          fi

          if [ "${LAST_SENT}" = "${CURRENT_MONTH}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled send already done for ${CURRENT_MONTH}. Marker=${MARKER_FILE}."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "No marker for ${CURRENT_MONTH}. Continue."
          fi

      - name: Skip duplicate monthly attempt
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run != 'true' }}
        run: |
          echo "Skipping retry attempt because this month is already marked as sent for this run type."

      - name: Setup Python
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl xlwt

      - name: Validate required secrets
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' }}
        run: |
          if [ -z "${EXPORT_USER}" ] || [ -z "${EXPORT_PASS}" ] || [ -z "${EXPORT_BASE_URL}" ]; then
            echo "Missing one or more required secrets: EXPORT_USER, EXPORT_PASS, EXPORT_BASE_URL."
            exit 1
          fi
          if [ -z "${SMTP_USER}" ] || [ -z "${SMTP_PASS}" ] || [ -z "${MAIL_FROM}" ] || [ -z "${MAIL_TO}" ]; then
            echo "Missing one or more required mail secrets: SMTP_USER, SMTP_PASS, MAIL_FROM, MAIL_TO."
            exit 1
          fi

      - name: Run export
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' }}
        run: |
          VIEW="${EXPORT_VIEW:-all}"
          MAX_ORDERS="${EXPORT_MAX_ORDERS:-0}"
          python order_export.py \
            --base-url "${EXPORT_BASE_URL}" \
            --username "${EXPORT_USER}" \
            --password "${EXPORT_PASS}" \
            --view "${VIEW}" \
            --max-orders "${MAX_ORDERS}" \
            --detail-timeout 120 \
            --detail-retries 4 \
            --detail-sleep 0.25 \
            --output orders_latest.csv \
            --items-output order_items_latest.csv \
            --report-output report_latest.csv \
            --xlsx-output report_latest.xlsx \
            --xls-output report_latest.xls

      - name: Publish latest XLS to Pages folder
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' }}
        run: |
          mkdir -p docs/latest
          cp report_latest.xls docs/latest/report_latest.xls
          date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/latest/last_updated_utc.txt

      - name: Send email notification (Gmail SMTP)
        id: send_mail
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' && success() && env.SMTP_USER != '' && env.SMTP_PASS != '' && env.MAIL_FROM != '' && env.MAIL_TO != '' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_KIND: ${{ steps.schedule_guard.outputs.run_kind }}
          EFFECTIVE_MAIL_TO: ${{ steps.schedule_guard.outputs.mail_to }}
        run: |
          python - <<'PY'
          import csv
          import html
          import os
          import smtplib
          from calendar import monthrange
          from datetime import datetime
          from email.message import EmailMessage
          from pathlib import Path

          report_path = Path("report_latest.csv")
          if not report_path.exists():
              raise RuntimeError("report_latest.csv saknas, kan inte bygga mejltabell.")

          def subtract_months(dt: datetime, months: int) -> datetime:
              year = dt.year
              month = dt.month - months
              while month <= 0:
                  month += 12
                  year -= 1
              day = min(dt.day, monthrange(year, month)[1])
              return dt.replace(year=year, month=month, day=day)

          now = datetime.now()
          cutoff = subtract_months(now, 2)

          with report_path.open("r", encoding="utf-8-sig", newline="") as handle:
              reader = csv.DictReader(handle)
              rows = list(reader)

          html_body = f"""
          <html>
            <body>
              <p>Rapporten är klar.</p>
              <p><strong>Filtrering:</strong></p>
              <ul>
                <li>Inkluderade poster: created från och med {html.escape(cutoff.strftime('%Y-%m-%d %H:%M:%S'))}</li>
                <li>Bortfiltrerade poster: created före {html.escape(cutoff.strftime('%Y-%m-%d %H:%M:%S'))}</li>
                <li>Körtid: {html.escape(now.strftime('%Y-%m-%d %H:%M:%S'))}</li>
                <li>Antal rader i rapport: {len(rows)}</li>
              </ul>
              <p>Workflow-körning: {html.escape(os.environ['RUN_URL'])}</p>
            </body>
          </html>
          """

          text_body = (
              "Rapporten är klar.\n\n"
              f"Filtrering:\n"
              f"- Inkluderade poster: created från och med {cutoff.strftime('%Y-%m-%d %H:%M:%S')}\n"
              f"- Bortfiltrerade poster: created före {cutoff.strftime('%Y-%m-%d %H:%M:%S')}\n"
              f"- Körtid: {now.strftime('%Y-%m-%d %H:%M:%S')}\n"
              f"- Antal rader: {len(rows)}\n\n"
              f"Workflow-körning: {os.environ['RUN_URL']}\n"
          )

          msg = EmailMessage()
          run_kind = os.environ.get("RUN_KIND", "manual").strip()
          if run_kind == "precheck":
              subject = "Förkörning (dagen före) - Månadsrapport Astice"
          else:
              subject = "Månadsrapport - Astice"
          msg["Subject"] = subject
          msg["From"] = os.environ["MAIL_FROM"]
          raw_to = os.environ.get("EFFECTIVE_MAIL_TO", "").strip() or os.environ["MAIL_TO"]
          msg["To"] = ", ".join([x.strip() for x in raw_to.split(",") if x.strip()])
          msg.set_content(text_body)
          msg.add_alternative(html_body, subtype="html")

          xls_path = Path("report_latest.xls")
          if xls_path.exists():
              with xls_path.open("rb") as handle:
                  msg.add_attachment(
                      handle.read(),
                      maintype="application",
                      subtype="vnd.ms-excel",
                      filename="report_latest.xls",
                  )

          smtp_user = os.environ["SMTP_USER"].strip()
          # Gmail app passwords are often shown grouped with spaces; SMTP expects
          # the raw token without whitespace.
          smtp_pass = "".join(os.environ["SMTP_PASS"].split())
          with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"])) as smtp:
              smtp.login(smtp_user, smtp_pass)
              smtp.send_message(msg)
          PY

      - name: Send warning if report email failed
        if: ${{ always() && steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run != 'false' && steps.send_mail.outcome != 'success' && env.RESEND_API_KEY != '' && env.RESEND_FROM != '' && env.ALERT_TO != '' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_KIND: ${{ steps.schedule_guard.outputs.run_kind }}
          TARGET_TO: ${{ steps.schedule_guard.outputs.mail_to }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          run_kind = os.environ.get("RUN_KIND", "unknown")
          target_to = os.environ.get("TARGET_TO", "(okänd mottagare)")
          run_url = os.environ["RUN_URL"]
          alert_to = os.environ["ALERT_TO"]

          payload = {
              "from": os.environ["RESEND_FROM"],
              "to": [alert_to],
              "subject": "VARNING: utskick misslyckades - Astice",
              "text": (
                  "Ett automatiskt utskick misslyckades.\n\n"
                  f"Körtyp: {run_kind}\n"
                  f"Tänkt mottagare: {target_to}\n"
                  f"Körning: {run_url}\n"
              ),
          }

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['RESEND_API_KEY']}",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              body = resp.read().decode("utf-8")
              print(f"Warning email sent via Resend: status={resp.status}, body={body}")
          PY

      - name: Mark month as sent (scheduled runs only)
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' && github.event_name == 'schedule' }}
        env:
          TZ: Europe/Stockholm
          RUN_KIND: ${{ steps.schedule_guard.outputs.run_kind }}
        run: |
          MARKER_FILE=""
          if [ "${RUN_KIND}" = "monthly" ]; then
            MARKER_FILE="docs/latest/last_sent_month.txt"
          elif [ "${RUN_KIND}" = "precheck" ]; then
            MARKER_FILE="docs/latest/last_precheck_month.txt"
          fi
          if [ -z "${MARKER_FILE}" ]; then
            echo "No schedule marker needed for run kind: ${RUN_KIND}"
            exit 0
          fi
          mkdir -p docs/latest
          date +"%Y-%m" > "${MARKER_FILE}"

      - name: Commit latest XLS and marker (if changed)
        id: publish
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILES_TO_ADD="docs/latest/report_latest.xls docs/latest/last_updated_utc.txt"
          if [ -f "docs/latest/last_sent_month.txt" ]; then
            FILES_TO_ADD="${FILES_TO_ADD} docs/latest/last_sent_month.txt"
          fi
          if [ -f "docs/latest/last_precheck_month.txt" ]; then
            FILES_TO_ADD="${FILES_TO_ADD} docs/latest/last_precheck_month.txt"
          fi
          git add -f ${FILES_TO_ADD}
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update latest report [skip ci]"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        if: ${{ steps.schedule_guard.outputs.run == 'true' && steps.monthly_lock.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: data-export-${{ github.run_number }}
          retention-days: 30
          if-no-files-found: error
          path: |
            report_latest.xlsx
            report_latest.xls
            report_latest.csv
            orders_latest.csv
            order_items_latest.csv
